<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sanctuary - تفاصيل المهمة</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Cairo:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#76f49d",
              "on-primary": "#ffffff",
              "primary-fixed-dim": "#a8c8ff",
              "background": "#f8f9fa",
              "error": "#ba1a1a",
              "surface-container": "#edeeef",
              "on-tertiary-fixed": "#00210c",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "primary-fixed": "#d6e3ff",
              "primary": "#00488d",
              "surface-bright": "#f8f9fa",
              "tertiary-container": "#006f38",
              "surface-dim": "#d9dadb",
              "inverse-primary": "#a8c8ff",
              "surface": "#f8f9fa",
              "on-secondary": "#ffffff",
              "tertiary-fixed": "#7efba4",
              "surface-tint": "#005db5",
              "surface-variant": "#e1e3e4",
              "surface-container-low": "#f3f4f5",
              "inverse-surface": "#2e3132",
              "secondary": "#944a00",
              "on-secondary-container": "#663100",
              "on-surface": "#191c1d",
              "tertiary": "#005429",
              "outline-variant": "#c2c6d4",
              "on-surface-variant": "#424752",
              "on-primary-fixed": "#001b3d",
              "tertiary-fixed-dim": "#61de8a",
              "secondary-fixed-dim": "#ffb783",
              "on-secondary-fixed": "#301400",
              "on-primary-fixed-variant": "#00468b",
              "inverse-on-surface": "#f0f1f2",
              "secondary-fixed": "#ffdcc5",
              "on-background": "#191c1d",
              "primary-container": "#005fb8",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "secondary-container": "#fc8f34",
              "on-error-container": "#93000a",
              "outline": "#727783",
              "on-secondary-fixed-variant": "#713700",
              "on-primary-container": "#cadcff",
              "on-tertiary-fixed-variant": "#005228",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#e1e3e4"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"],
              "arabic": ["Cairo"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .font-plus-jakarta-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { min-height: 100dvh; animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .btn-press:active { transform: scale(0.94); transition: transform 0.1s; }
    .nav-item { transition: all 0.2s ease; }
    .nav-item:active { transform: scale(0.88); }
    /* Premium Deep Black Mode */
    html.dark body { background-color: #000000 !important; color: #f8f9fa; }
    html.dark .bg-surface-container-lowest { background-color: #0d0d0d !important; border-color: #222 !important; }
    html.dark .bg-surface-container-low { background-color: #141414 !important; }
    html.dark .bg-surface-container-high { background-color: #1a1a1a !important; }
    html.dark .bg-white { background-color: #000 !important; border-color: #222 !important; }
    html.dark .text-on-surface { color: #f8f9fa !important; }
    html.dark .text-on-surface-variant { color: #bfc8ca !important; }
    html.dark .border-outline-variant { border-color: #333 !important; }
    html.dark #toast { background-color: #222 !important; border: 1px solid #333 !important; }

    #toast {
        position: fixed; bottom: 100px; left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #191c1d; color: #fff;
        padding: 10px 22px; border-radius: 999px;
        font-size: 13px; font-family: 'Cairo', sans-serif; font-weight: 600;
        opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
</style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-24">
<!-- Toast -->
<div id="toast"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-xl border-b border-outline-variant/30">
<div class="flex items-center justify-between px-5 py-4 w-full max-w-lg mx-auto">
<div class="flex items-center gap-3">
<button class="p-2 hover:bg-surface-container transition-colors active:scale-95 duration-200 rounded-full btn-press"
        onclick="navigate('../sanctuary_dashboard/code.html')" title="رجوع">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-on-surface font-headline trans-key" data-key="tasks_nav">المهام</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-surface-container transition-colors btn-press"
        onclick="showToast('خيارات المهمة')">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</div>
</div>
</header>
<main class="pt-24 px-6 max-w-4xl mx-auto pb-32">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-3xl font-extrabold font-headline tracking-tight text-on-surface trans-key" data-key="task_mgmt_title">إدارة المهام</h2>
            <p class="text-on-surface-variant font-arabic font-medium mt-1 trans-key" data-key="task_list_subtitle">قائمة بجميع المهام المضافة</p>
        </div>
        <button class="bg-primary text-on-primary px-4 py-2 rounded-xl font-bold hover:scale-105 transition-transform flex items-center gap-2 btn-press"
                onclick="navigate('../stitch_task_list/code.html')">
            <span class="material-symbols-outlined">add</span>
            <span class="trans-key" data-key="new_task_btn">مهمة جديدة</span>
        </button>
    </div>

    <!-- Tabs -->
    <div class="flex bg-surface-container-low p-1.5 rounded-2xl gap-1 mb-6">
        <button id="tab-active" class="tab-btn active flex-1 bg-primary text-on-primary shadow-md py-2.5 text-sm font-bold rounded-xl transition-all btn-press trans-key" data-key="active_tasks_tab" onclick="switchTab('active')">المهام الحالية</button>
        <button id="tab-archive" class="tab-btn flex-1 text-on-surface-variant py-2.5 text-sm font-bold rounded-xl hover:bg-surface-container-high transition-all btn-press trans-key" data-key="archive_tasks_tab" onclick="switchTab('archive')">الأرشيف (مكتملة)</button>
    </div>

    <!-- Tasks List Container -->
    <div id="tasks-container" class="space-y-4">
        <!-- Dynamic Tasks will be injected here -->
    </div>
</main>
<!-- ===== Bottom Navigation Bar ===== -->
<nav class="fixed bottom-0 left-0 w-full z-50 rounded-t-3xl bg-surface-container-lowest shadow-[0_-4px_24px_rgba(0,0,0,0.06)] border-t border-outline-variant/20">
<div class="w-full flex justify-around items-center px-2 pb-5 pt-3">
<a href="../sanctuary_dashboard/code.html"
   class="nav-item flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-w-[56px] hover:text-primary transition-colors rounded-2xl hover:bg-primary/5" title="Home">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium font-cairo mt-0.5 trans-key" data-key="home_nav">الرئيسية</span>
</a>
<a href="code.html"
   class="nav-item flex flex-col items-center justify-center bg-primary/10 text-primary rounded-2xl px-4 py-2 min-w-[56px]" title="Tasks">
<span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">check_circle</span>
<span class="text-[10px] font-bold font-cairo mt-0.5 trans-key" data-key="tasks_nav">المهام</span>
</a>
<a href="../calendar_with_deadline_alerts/code.html"
   class="nav-item flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-w-[56px] hover:text-primary transition-colors rounded-2xl hover:bg-primary/5" title="Calendar">
<span class="material-symbols-outlined">calendar_month</span>
<span class="text-[10px] font-medium font-cairo mt-0.5 trans-key" data-key="calendar_nav">التقويم</span>
</a>
<a href="../budgets/code.html"
   class="nav-item flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-w-[56px] hover:text-primary transition-colors rounded-2xl hover:bg-primary/5" title="Finance">
<span class="material-symbols-outlined">payments</span>
<span class="text-[10px] font-medium font-cairo mt-0.5 trans-key" data-key="reports_nav">الميزانية</span>
</a>
<a href="../advanced_settings/code.html"
   class="nav-item flex flex-col items-center justify-center text-on-surface-variant px-4 py-2 min-w-[56px] hover:text-primary transition-colors rounded-2xl hover:bg-primary/5" title="Settings">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium font-cairo mt-0.5 trans-key" data-key="settings_nav">الإعدادات</span>
</a>
</div>
</nav>
<script>
    const translations = {
        en: {
            task_mgmt_title: 'Task Management',
            task_list_subtitle: 'All your tasks in one place',
            new_task_btn: 'New Task',
            active_tasks_tab: 'Current Tasks',
            archive_tasks_tab: 'Archive (Completed)',
            home_nav: 'Home',
            tasks_nav: 'Tasks',
            calendar_nav: 'Calendar',
            reports_nav: 'Finance',
            settings_nav: 'Settings',
            empty_active_title: 'No active tasks',
            empty_active_desc: 'You haven\'t added any tasks yet. Start by adding one above.',
            empty_archive_title: 'Archive is empty',
            empty_archive_desc: 'Complete tasks to see them here.',
            p_low: 'Low Priority',
            p_med: 'Medium Priority',
            p_urg: 'Urgent 🔥',
            cat_work: 'Work',
            cat_home: 'Home',
            cat_person: 'Personal',
            cat_health: 'Health',
            deadline_label: 'Deadline',
            task_done: '✓ Task completed!',
            subtask_progress: 'Subtasks Progress',
            voice_attach: 'Voice recording attached'
        },
        ar: {
            task_mgmt_title: 'إدارة المهام',
            task_list_subtitle: 'قائمة بجميع المهام المضافة',
            new_task_btn: 'مهمة جديدة',
            active_tasks_tab: 'المهام الحالية',
            archive_tasks_tab: 'الأرشيف (مكتملة)',
            home_nav: 'الرئيسية',
            tasks_nav: 'المهام',
            calendar_nav: 'التقويم',
            reports_nav: 'الميزانية',
            settings_nav: 'الإعدادات',
            empty_active_title: 'لا توجد مهام حالياً',
            empty_active_desc: 'لم تقم بإضافة أي مهام بعد. يمكنك البدء بإضافة مهمتك الأولى من الزر بالأعلى.',
            empty_archive_title: 'الأرشيف فارغ',
            empty_archive_desc: 'لم تقم بإنجاز أي مهام بعد لتضاف إلى الأرشيف.',
            p_low: 'أولوية منخفضة',
            p_med: 'أولوية متوسطة',
            p_urg: 'مهمة عاجلة 🔥',
            cat_work: 'العمل',
            cat_home: 'المنزل',
            cat_person: 'شخصي',
            cat_health: 'صحة',
            deadline_label: 'موعد نهائي',
            task_done: '✓ تم إنجاز المهمة!',
            subtask_progress: 'تقدم المهام الفرعية',
            voice_attach: 'مُرفق صوتي'
        }
    };

    function applyGlobalState() {
        const isDark = localStorage.getItem('sanctuary_dark_mode') === 'true';
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');

        const lang = localStorage.getItem('sanctuary_lang') || 'ar';
        const dict = translations[lang];
        document.documentElement.lang = lang;
        document.documentElement.dir = (lang === 'ar' ? 'rtl' : 'ltr');

        document.querySelectorAll('.trans-key').forEach(el => {
            const key = el.getAttribute('data-key');
            if (dict[key]) el.textContent = dict[key];
        });
    }

    function navigate(url) {
        document.body.style.opacity = '0.7';
        document.body.style.transition = 'opacity 0.15s ease';
        setTimeout(() => { window.location.href = url; }, 150);
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(window._toastTimer);
        window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function markTaskDone(taskId) {
        const lang = localStorage.getItem('sanctuary_lang') || 'ar';
        let tasks = JSON.parse(localStorage.getItem('sanctuary_tasks')) || [];
        const task = tasks.find(t => t.id === taskId.toString());
        if(task) {
            task.completed = !task.completed;
            localStorage.setItem('sanctuary_tasks', JSON.stringify(tasks));
            renderTasks();
            if(task.completed) showToast(translations[lang].task_done);
        }
    }

    let currentTab = 'active';

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'bg-primary', 'text-on-primary', 'shadow-md');
            b.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high');
        });
        const activeBtn = document.getElementById('tab-' + tab);
        activeBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high');
        activeBtn.classList.add('active', 'bg-primary', 'text-on-primary', 'shadow-md');
        renderTasks();
    }

    function renderTasks() {
        const container = document.getElementById('tasks-container');
        const tasks = JSON.parse(localStorage.getItem('sanctuary_tasks')) || [];
        const lang = localStorage.getItem('sanctuary_lang') || 'ar';
        const curr = localStorage.getItem('sanctuary_currency') || 'SAR';
        const symbols = { 'SAR': 'ر.س', 'USD': '$', 'EGP': 'ج.م' };
        const dict = translations[lang];
        
        const priorityBadgeParams = {
            'low':    { key: 'p_low', classes: 'bg-surface-container-high text-on-surface-variant' },
            'medium': { key: 'p_med', classes: 'bg-primary/20 text-primary' },
            'urgent': { key: 'p_urg', classes: 'bg-error text-on-error' }
        };

        const categoryParams = {
            'work':     { icon: 'work',     key: 'cat_work', classes: 'bg-primary-container text-on-primary-container' },
            'home':     { icon: 'home',     key: 'cat_home', classes: 'bg-secondary-fixed text-on-secondary-fixed' },
            'personal': { icon: 'person',   key: 'cat_person', classes: 'bg-tertiary-fixed text-on-tertiary-fixed' },
            'health':   { icon: 'favorite', key: 'cat_health', classes: 'bg-surface-container-high text-on-surface-variant' }
        };

        let filteredTasks = tasks.filter(t => currentTab === 'active' ? !t.completed : t.completed);

        if (filteredTasks.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center p-12 bg-surface-container-lowest rounded-3xl border-2 border-dashed border-outline-variant/30 text-center animate-fade-in">
                    <span class="material-symbols-outlined text-outline-variant text-6xl mb-4">${currentTab === 'active' ? 'check_circle' : 'archive'}</span>
                    <h3 class="text-xl font-bold font-headline text-on-surface">${currentTab === 'active' ? dict.empty_active_title : dict.empty_archive_title}</h3>
                    <p class="text-on-surface-variant mt-2 text-sm">${currentTab === 'active' ? dict.empty_active_desc : dict.empty_archive_desc}</p>
                </div>
            `;
            return;
        }

        filteredTasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

        container.innerHTML = filteredTasks.map(task => {
            const pBadge = priorityBadgeParams[task.priority] || priorityBadgeParams['medium'];
            const cBadge = categoryParams[task.category] || categoryParams['work'];
            const completedClass = task.completed ? 'opacity-80' : '';
            const checkedState = task.completed ? 'checked' : '';

            let subtaskSection = '';
            if (task.subtasks && task.subtasks.length > 0) {
                const total = task.subtasks.length;
                const done = task.subtasks.filter(s => s.done).length;
                const pct = (done / total) * 100;
                subtaskSection = `
                    <div class="mt-4 pt-4 border-t border-surface-container">
                        <div class="flex justify-between text-xs font-bold text-on-surface-variant mb-2">
                            <span>${dict.subtask_progress}</span>
                            <span>${done} / ${total}</span>
                        </div>
                        <div class="w-full h-1.5 bg-surface-container-high rounded-full overflow-hidden">
                            <div class="h-full bg-primary" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="bg-surface-container-lowest p-5 rounded-2xl shadow-sm border border-outline-variant/10 hover:shadow-md transition-all flex flex-col md:flex-row gap-5 cursor-pointer hover:bg-surface-container-low group ${completedClass}"
                     onclick="navigate('../stitch_task_list/code.html?taskId=${task.id}')">
                    <div class="flex-shrink-0 pt-1">
                        <input type="checkbox" 
                               class="w-6 h-6 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer"
                               ${checkedState}
                               onclick="event.stopPropagation()"
                               onchange="markTaskDone('${task.id}')" />
                    </div>

                    <div class="flex-1 min-w-0">
                        <div class="flex flex-wrap items-center gap-2 mb-3 mt-1">
                            <span class="px-2 py-1 text-[10px] font-bold rounded-lg ${pBadge.classes}">${dict[pBadge.key]}</span>
                            <span class="flex items-center gap-1 px-2 py-1 text-[10px] font-bold rounded-lg ${cBadge.classes}">
                                <span class="material-symbols-outlined text-[12px]">${cBadge.icon}</span>
                                ${dict[cBadge.key]}
                            </span>
                            ${task.budget ? `<span class="px-2 py-1 text-[10px] font-bold rounded-lg bg-emerald-50 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-800 flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">payments</span> ${task.budget} ${symbols[curr]}</span>` : ''}
                            ${task.hasVoice ? `<span class="px-2 py-1 text-[10px] font-bold rounded-lg bg-surface-container-high text-on-surface flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">mic</span> ${dict.voice_attach}</span>` : ''}
                        </div>

                        <h4 class="text-xl font-bold text-on-surface mb-2 font-headline title-cutoff ${task.completed ? 'line-through' : ''}">${task.title}</h4>
                        ${task.desc ? `<p class="text-sm text-on-surface-variant leading-relaxed line-clamp-2">${task.desc}</p>` : ''}
                        
                        ${task.endDate ? `
                        <div class="flex items-center gap-1.5 mt-4 text-xs font-bold text-error">
                            <span class="material-symbols-outlined text-[14px]">event_busy</span>
                            ${dict.deadline_label}: ${new Intl.DateTimeFormat(lang === 'ar' ? 'ar-EG' : 'en-US', { dateStyle: 'medium' }).format(new Date(task.endDate))}
                        </div>
                        ` : ''}

                        ${subtaskSection}
                    </div>
                </div>
            `;
        }).join('');
    }

    window.addEventListener('load', () => {
        applyGlobalState();
        renderTasks();
    });
</script>
</body></html>
